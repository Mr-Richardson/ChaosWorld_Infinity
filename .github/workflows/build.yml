# This file was mainly programmed by an AI.

name: Game Build

on:
  push:
    branches: [ "kotlin-migration" ]
  pull_request:
    branches: [ "kotlin-migration" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile
        run: |
          ./kotlin build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Game-Executable
          path: ChaosWorld:Infinity.jar
