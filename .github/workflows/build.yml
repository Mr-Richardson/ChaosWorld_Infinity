name: Build Processing Sketch

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Processing
        run: |
          wget https://github.com/processing/processing4/releases/download/processing-1293-4.3/processing-4.3-linux-x64.tgz
          tar -xzf processing-4.3-linux-x64.tgz
          echo "${{ github.workspace }}/processing-4.3" >> $GITHUB_PATH

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxrender1 libxtst6 libxi6 libgl1-mesa-glx libasound2

      - name: Build for Windows
        run: |
          xvfb-run --auto-servernum processing-java --sketch="${{ github.workspace }}/ChaosWorld_Infinity" --output="${{ github.workspace }}/build/windows" --platform=windows --export --force

      - name: Build for Linux
        run: |
          xvfb-run --auto-servernum processing-java --sketch="${{ github.workspace }}/ChaosWorld_Infinity" --output="${{ github.workspace }}/build/linux" --platform=linux --export --force

      - name: Build for macOS
        run: |
          xvfb-run --auto-servernum processing-java --sketch="${{ github.workspace }}/ChaosWorld_Infinity" --output="${{ github.workspace }}/build/macos" --platform=macos --export --force

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ChaosWorld_Infinity-Builds
          path: build/