name: Game Test

on: [ push, pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KOTLIN_CLI_NO_WELCOME_BANNER: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Kotlin Toolchain
        uses: actions/cache@v4
        with:
          path: ~/.cache/JetBrains/Kotlin/cli
          key: kotlin-toolchain-${{ runner.os }}-${{ hashFiles('./kotlin') }}
          restore-keys: kotlin-toolchain-${{ runner.os }}-

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/module.yaml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Compile game
        run: ./kotlin test

