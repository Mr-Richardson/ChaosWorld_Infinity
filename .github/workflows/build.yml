# This file was mainly programmed by an AI.

name: Game Build

on:
  push:
    branches: [ "dev", "java-migration" ]
  pull_request:
    branches: [ "dev", "java-migration" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Compile
        run: |
          ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Game-Executable
          path: ChaosWorld:Infinity.jar