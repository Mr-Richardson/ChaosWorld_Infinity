# This file was programmed by an AI.

name: Java 26 Build

on:
  push:
    branches: [ "dev", "java-migration" ]
  pull_request:
    branches: [ "dev", "java-migration" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Download Processing Core
        run: |
          wget https://github.com/processing/processing4/releases/download/processing-1293-4.3/processing-4.3-linux-x64.tgz
          tar -xzf processing-4.3-linux-x64.tgz
          mkdir -p libs
          cp processing-4.3/core/library/core.jar libs/

      - name: Compile Java Sources
        run: |
          mkdir -p build/classes
          find src -name "*.java" > sources.txt
          javac -cp "libs/core.jar" -d build/classes @sources.txt

      - name: Create Executable JAR
        run: |
          jar cfe Game.jar io.github.richardson.Main -C build/classes .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Game-Executable
          path: ChaosWorld_Infinity.jar